<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voyager à travers le monde</title>
      <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
          <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background-color: #ffffff;
            color: #333;
        }

        header {
            background: linear-gradient(120deg, #e17a35, #202020);
            color: rgb(255, 255, 255);
            padding: 20px;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav a {
            color: rgb(255, 255, 255);
            margin: 0 10px;
            text-decoration: none;
            font-weight: 600;
        }

        nav a:hover {
            text-decoration: underline;
        }

        .hero {
            text-align: center;
            padding: 50px;
        }

        .hero h1 {
            font-size: 3em;
        }

        .btn {
            background-color: rgb(255, 255, 255);
            color: #e17a35;
            padding: 10px 20px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
        }
                main {
            padding: 40px;
        }

        .cards {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .card {
            background-color: rgb(209, 101, 30);
            border-radius: 12px;
            padding: 20px;
            width: 250px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
        }

        .card img {
            width: 100%;
            border-radius: 10px;
        }

        iframe {
            width: 100%;
            height: 300px;
            border-radius: 10px;
            border: none;
        }
                form {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            max-width: 400px;
            margin: auto;
        }

        input, textarea, select {
            width: 100%;
            margin-bottom: 10px;
            padding: 8px;
        }

        footer {
            background-color: #c62121;
            color: white;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>
  <header>
    <nav>
        <h2>🌍 Voyager à travers le monde</h2>
        <div>
            <a href="#accueil">Accueil</a>
            <a href="#destinations">Destinations</a>
            <a href="#carte">Carte</a>
            <a href="#contact">Contact</a>
        </div>
    </nav>

    <div class="hero">
        <h1>Découvrez les Hauts-de-France</h1>
        <p>Voyagez entre Clermont et Lomme</p>
        <a href="#destinations" class="btn">Commencer</a>
    </div>
    <main>

    <section id="destinations">
        <h2>Destinations populaires</h2>
        <div class="cards">
            <div class="card">
                <img src="https://picsum.photos/300/200" alt="Clermont">
                <h3>Clermont</h3>
                <p>La ville historique.</p>
            </div>

            <div class="card">
                <img src="https://picsum.photos/301/200" alt="Lomme">
                <h3>Lomme</h3>
                <p>La ville en périphérie de Lille.</p>
            </div>
        </div>
    </section>

</main>
</header>

</body>
</html>
